openapi: 3.1.0
info:
  title: Kitchen Ecommerce API
  version: 1.0.0
  description: |
    RESTful API for managing a kitchen ecommerce platform.
    All endpoints prefixed with `/api`.

servers:
  - url: http://localhost:8000/api
    description: Local development

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: plainTextToken
      description: Sanctum token. Obtain via POST /api/login or POST /api/register.

  schemas:
    # ─── Auth ───────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [name, email, password, password_confirmation]
      properties:
        name:                { type: string, example: "Jane Doe", maxLength: 255 }
        email:               { type: string, format: email, example: "jane@example.com", maxLength: 255 }
        password:            { type: string, format: password, example: "Password1!" }
        password_confirmation: { type: string, example: "Password1!" }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, format: email, example: "jane@example.com" }
        password: { type: string, format: password, example: "Password1!" }

    AuthResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            id:         { type: integer, example: 1 }
            name:       { type: string, example: "Jane Doe" }
            email:      { type: string, example: "jane@example.com" }
            role:       { type: string, example: "user" }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }
        token:
          type: string
          example: "2|abc123def456..."

    LogoutResponse:
      type: object
      properties:
        message: { type: string, example: "Logged out successfully." }

    UserResponse:
      type: object
      properties:
        id:         { type: integer, example: 1 }
        name:       { type: string, example: "Jane Doe" }
        email:      { type: string, example: "jane@example.com" }
        role:       { type: string, example: "user" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # ─── Category ──────────────────────────────────────
    Category:
      type: object
      properties:
        id:          { type: integer, example: 1 }
        name:        { type: string, example: "Kitchen Appliances" }
        slug:        { type: string, example: "kitchen-appliances" }
        description: { type: string, nullable: true, example: "All kitchen appliances." }
        image:       { type: string, nullable: true, example: "categories/kitchen-appliances.jpg" }
        status:      { type: boolean, example: true }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    CategoryCollection:
      type: object
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Category" } }

    StoreCategoryRequest:
      type: object
      required: [name, slug]
      properties:
        name:        { type: string, example: "New Category", maxLength: 255 }
        slug:        { type: string, example: "new-category", maxLength: 255 }
        description: { type: string, example: "Category description." }
        image:       { type: string, example: "categories/new-category.jpg", maxLength: 255 }
        status:      { type: boolean, example: true }

    # ─── Brand ──────────────────────────────────────────
    Brand:
      type: object
      properties:
        id:          { type: integer, example: 1 }
        name:        { type: string, example: "Philips" }
        slug:        { type: string, example: "philips" }
        description: { type: string, nullable: true, example: "Leading electronics brand." }
        logo:        { type: string, nullable: true, example: "brands/philips.png" }
        status:      { type: boolean, example: true }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    BrandCollection:
      type: object
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Brand" } }

    StoreBrandRequest:
      type: object
      required: [name, slug]
      properties:
        name:        { type: string, example: "New Brand", maxLength: 255 }
        slug:        { type: string, example: "new-brand", maxLength: 255 }
        description: { type: string, example: "Brand description." }
        logo:        { type: string, example: "brands/new-brand.png", maxLength: 255 }
        status:      { type: boolean, example: true }

    # ─── Product ────────────────────────────────────────
    Product:
      type: object
      properties:
        id:          { type: integer, example: 1 }
        name:        { type: string, example: "Premium Blender" }
        slug:        { type: string, example: "premium-blender" }
        description: { type: string, example: "High-speed blender." }
        price:       { type: string, example: "89.99" }
        stock:       { type: integer, example: 25 }
        image:       { type: string, example: "products/abc-123.jpg" }
        status:      { type: boolean, example: true }
        category_id: { type: integer, example: 1 }
        brand_id:    { type: integer, example: 1 }
        category:    { $ref: "#/components/schemas/Category" }
        brand:       { $ref: "#/components/schemas/Brand" }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    ProductCollection:
      allOf:
        - $ref: "#/components/schemas/PaginatedData"
        - properties:
            data: { type: array, items: { $ref: "#/components/schemas/Product" } }

    StoreProductRequest:
      type: object
      required: [name, slug, price, stock, category_id, brand_id]
      properties:
        name:        { type: string, example: "New Product", maxLength: 255 }
        slug:        { type: string, example: "new-product", maxLength: 255 }
        description: { type: string, example: "Product description." }
        price:       { type: number, format: float, example: 49.99, minimum: 0 }
        stock:       { type: integer, example: 50, minimum: 0 }
        image:       { type: string, example: "products/new-product.jpg", maxLength: 255 }
        status:      { type: boolean, example: true }
        category_id: { type: integer, example: 1 }
        brand_id:    { type: integer, example: 1 }

    # ─── Cart ───────────────────────────────────────────
    CartItem:
      type: object
      properties:
        id:         { type: integer, example: 1 }
        user_id:    { type: integer, example: 1 }
        product_id: { type: integer, example: 1 }
        quantity:   { type: integer, example: 2 }
        status:     { type: string, nullable: true, example: null }
        product:    { $ref: "#/components/schemas/Product" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AddToCartRequest:
      type: object
      required: [product_id, quantity]
      properties:
        product_id: { type: integer, example: 1 }
        quantity:   { type: integer, example: 2, minimum: 1 }

    UpdateCartRequest:
      type: object
      required: [quantity]
      properties:
        quantity: { type: integer, example: 3, minimum: 1 }

    CartMessageResponse:
      type: object
      properties:
        message: { type: string, example: "Cart item removed." }

    # ─── Order / Checkout ──────────────────────────────
    OrderItem:
      type: object
      properties:
        id:         { type: integer, example: 1 }
        order_id:   { type: integer, example: 1 }
        product_id: { type: integer, example: 1 }
        quantity:   { type: integer, example: 2 }
        price:      { type: string, example: "89.99" }
        product:    { $ref: "#/components/schemas/Product" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Order:
      type: object
      properties:
        id:              { type: integer, example: 1 }
        user_id:         { type: integer, example: 1 }
        total_amount:    { type: string, example: "179.98" }
        status:          { type: string, nullable: true, example: "pending" }
        shipping_address: { type: string, example: "123 Test St" }
        phone_number:    { type: string, example: "1234567890" }
        payment_status:  { type: string, nullable: true, example: "unpaid" }
        payment_method:  { type: string, nullable: true, example: "cod" }
        items:           { type: array, items: { $ref: "#/components/schemas/OrderItem" } }
        created_at:      { type: string, format: date-time }
        updated_at:      { type: string, format: date-time }

    StoreOrderRequest:
      type: object
      required: [shipping_address, phone_number]
      properties:
        shipping_address: { type: string, example: "123 Test St", maxLength: 500 }
        phone_number:     { type: string, example: "1234567890", maxLength: 20 }

    StoreCheckoutRequest:
      type: object
      required: [shipping_address, phone_number, payment_method]
      properties:
        shipping_address: { type: string, example: "123 Test St", maxLength: 500 }
        phone_number:     { type: string, example: "1234567890", maxLength: 20 }
        payment_method:   { type: string, enum: [cod, bank_transfer], example: "cod" }

    # ─── Shared ─────────────────────────────────────────
    PaginatedData:
      type: object
      properties:
        data: { type: array, items: {} }
        meta:
          type: object
          properties:
            current_page: { type: integer, example: 1 }
            last_page:    { type: integer, example: 5 }
            per_page:     { type: integer, example: 12 }
            total:        { type: integer, example: 60 }
        links:
          type: object
          properties:
            first: { type: string, example: "http://localhost:8000/api/products?page=1" }
            last:  { type: string, example: "http://localhost:8000/api/products?page=5" }
            prev:  { type: string, nullable: true, example: null }
            next:  { type: string, nullable: true, example: "http://localhost:8000/api/products?page=2" }

    Error422:
      type: object
      properties:
        message: { type: string, example: "The email field is required. (and 2 more errors)" }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
          example:
            email: ["The email field is required."]
            password: ["The password field is required."]

    Error401:
      type: object
      properties:
        message: { type: string, example: "Unauthenticated." }

    Error403:
      type: object
      properties:
        message: { type: string, example: "Forbidden." }

    Error404:
      type: object
      properties:
        message: { type: string, example: "No query results for model [App\\Models\\Product] 999" }

    Error422Message:
      type: object
      properties:
        message: { type: string }

    AdminMessageResponse:
      type: object
      properties:
        message: { type: string, example: "Product deleted successfully." }

paths:
  # ═══════════════════════════════════════════════════════
  #  AUTH
  # ═══════════════════════════════════════════════════════
  /register:
    post:
      tags: [Authentication]
      summary: Register a new user
      description: Create a new user account and return a Sanctum API token.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "422":
          description: Validation failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error422" }

  /login:
    post:
      tags: [Authentication]
      summary: Login
      description: Authenticate with email and password, returns a Sanctum token.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "422":
          description: Invalid credentials / validation failed
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error422"
                  - type: object
                    properties:
                      message: { type: string, example: "The provided credentials are incorrect." }
                      errors:
                        type: object
                        properties:
                          email: { type: array, items: { type: string, example: "The provided credentials are incorrect." } }

  /logout:
    post:
      tags: [Authentication]
      summary: Logout
      description: Revoke the current access token.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LogoutResponse" }
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error401" }

  /user:
    get:
      tags: [Authentication]
      summary: Get authenticated user
      description: Return the profile of the currently authenticated user.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserResponse" }
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error401" }

  # ═══════════════════════════════════════════════════════
  #  PRODUCTS  (Public)
  # ═══════════════════════════════════════════════════════
  /products:
    get:
      tags: [Catalog - Products]
      summary: List products
      description: |
        Paginated list of products (12 per page).
        Supports search, filtering by category/brand, and price range.
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
          description: Page number
        - name: search
          in: query
          schema: { type: string }
          description: Search by product name (partial match)
        - name: category_id
          in: query
          schema: { type: integer }
          description: Filter by category ID
        - name: brand_id
          in: query
          schema: { type: integer }
          description: Filter by brand ID
        - name: min_price
          in: query
          schema: { type: number, format: float }
          description: Minimum price filter
        - name: max_price
          in: query
          schema: { type: number, format: float }
          description: Maximum price filter
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProductCollection" }

  /products/{product}:
    get:
      tags: [Catalog - Products]
      summary: Show product
      description: Get a single product by ID with category and brand included.
      parameters:
        - name: product
          in: path
          required: true
          schema: { type: integer }
          description: Product ID
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Product" }
        "404":
          description: Product not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error404" }

  # ═══════════════════════════════════════════════════════
  #  CATEGORIES  (Public)
  # ═══════════════════════════════════════════════════════
  /categories:
    get:
      tags: [Catalog - Categories]
      summary: List categories
      description: Return all categories.
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CategoryCollection" }

  /categories/{category}:
    get:
      tags: [Catalog - Categories]
      summary: Show category
      description: Get a single category by ID.
      parameters:
        - name: category
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Category detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Category" }
        "404":
          description: Category not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error404" }

  # ═══════════════════════════════════════════════════════
  #  BRANDS  (Public)
  # ═══════════════════════════════════════════════════════
  /brands:
    get:
      tags: [Catalog - Brands]
      summary: List brands
      description: Return all brands.
      responses:
        "200":
          description: Brand list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BrandCollection" }

  /brands/{brand}:
    get:
      tags: [Catalog - Brands]
      summary: Show brand
      description: Get a single brand by ID.
      parameters:
        - name: brand
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Brand detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Brand" }
        "404":
          description: Brand not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error404" }

  # ═══════════════════════════════════════════════════════
  #  CART
  # ═══════════════════════════════════════════════════════
  /cart:
    get:
      tags: [Cart]
      summary: List cart items
      description: Get all items in the authenticated user's cart with product details.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Cart items
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CartItem" }
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error401" }

    post:
      tags: [Cart]
      summary: Add to cart
      description: |
        Add a product to the cart. If the product already exists in the cart,
        the quantity is increased instead.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddToCartRequest" }
      responses:
        "201":
          description: New cart item created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CartItem" }
        "200":
          description: Existing cart item quantity updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CartItem" }
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error401" }
        "422":
          description: Validation failed or insufficient stock
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error422"
                  - { $ref: "#/components/schemas/Error422Message" }

  /cart/{cart}:
    put:
      tags: [Cart]
      summary: Update cart item
      description: Update the quantity of a specific cart item.
      security:
        - BearerAuth: []
      parameters:
        - name: cart
          in: path
          required: true
          schema: { type: integer }
          description: Cart item ID
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCartRequest" }
      responses:
        "200":
          description: Cart item updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CartItem" }
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error401" }
        "403":
          description: Forbidden (not your cart item)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error403" }
        "404":
          description: Cart item not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error404" }
        "422":
          description: Validation failed or insufficient stock
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error422"
                  - { $ref: "#/components/schemas/Error422Message" }

    delete:
      tags: [Cart]
      summary: Remove cart item
      security:
        - BearerAuth: []
      parameters:
        - name: cart
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Cart item removed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CartMessageResponse" }
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error401" }
        "403":
          description: Forbidden
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error403" }
        "404":
          description: Cart item not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error404" }

  # ═══════════════════════════════════════════════════════
  #  ORDERS
  # ═══════════════════════════════════════════════════════
  /orders:
    get:
      tags: [Orders]
      summary: List orders
      description: Get all orders for the authenticated user with items and products.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Order" }
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error401" }

    post:
      tags: [Orders]
      summary: Create order
      description: |
        Create an order from the current cart contents.
        Does not set payment fields (use /checkout for payment).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StoreOrderRequest" }
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Order" }
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error401" }
        "422":
          description: Empty cart, validation failed, or insufficient stock
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error422"
                  - { $ref: "#/components/schemas/Error422Message" }

  /orders/{order}:
    get:
      tags: [Orders]
      summary: Show order
      description: Get a single order with items and products.
      security:
        - BearerAuth: []
      parameters:
        - name: order
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Order" }
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error401" }
        "403":
          description: Forbidden (not your order)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error403" }
        "404":
          description: Order not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error404" }

  # ═══════════════════════════════════════════════════════
  #  CHECKOUT
  # ═══════════════════════════════════════════════════════
  /checkout:
    post:
      tags: [Checkout]
      summary: Checkout
      description: |
        Create an order with payment details from the current cart contents.
        Cart items are cleared and stock is decremented on success.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StoreCheckoutRequest" }
      responses:
        "201":
          description: Checkout completed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Order" }
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error401" }
        "422":
          description: Empty cart, validation failed, or insufficient stock
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error422"
                  - { $ref: "#/components/schemas/Error422Message" }

  # ═══════════════════════════════════════════════════════
  #  ADMIN - PRODUCTS
  # ═══════════════════════════════════════════════════════
  /admin/products:
    get:
      tags: [Admin - Products]
      summary: Admin list products
      description: Paginated list of all products (12 per page) with category and brand.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProductCollection" }
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error401" }
        "403":
          description: Forbidden (not admin)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error403" }

    post:
      tags: [Admin - Products]
      summary: Admin create product
